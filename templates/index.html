<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spirograph</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #faf8f5;
      color: #333;
    }
    canvas {
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
      cursor: crosshair;
    }
    #info {
      margin-top: 10px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Spirograph</h1>
  <p>Press inside the circle and drag to draw a dot. Drag wider for a bigger,
     loopier pattern; drag mostly sideways or up-and-down to stretch it.</p>

  <canvas id="board" width="400" height="400"></canvas>
  <div id="info">No dot yet.</div>

  <!-- Python's spirograph picture will appear here. -->
  <div>
    <img id="result" width="400" alt="Your spirograph will appear here">
  </div>

  <script>
    // ---- Grab the canvas and its "drawing context" ----
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const info = document.getElementById("info");

    // The boundary circle.
    const center = { x: 200, y: 200 };
    const radius = 180;

    // The dot now has a position AND a size/shape:
    //   x, y   = its center
    //   rx, ry = its horizontal and vertical radius
    let dot = null;
    let dragging = false;   // are we currently drawing the dot?

    // ---- Helpers ----
    // Convert a mouse event into canvas coordinates.
    function getPos(event) {
      const rect = canvas.getBoundingClientRect();
      return { x: event.clientX - rect.left, y: event.clientY - rect.top };
    }

    // Is a point inside the boundary circle?
    function insideCircle(x, y) {
      const dx = x - center.x;
      const dy = y - center.y;
      return Math.sqrt(dx * dx + dy * dy) <= radius;
    }

    // ---- Draw everything from scratch ----
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // The boundary circle.
      ctx.beginPath();
      ctx.arc(center.x, center.y, radius, 0, 2 * Math.PI);
      ctx.strokeStyle = "#888";
      ctx.lineWidth = 2;
      ctx.stroke();

      // The dot (an oval), if there is one.
      if (dot) {
        ctx.beginPath();
        ctx.ellipse(
          dot.x, dot.y,
          Math.max(dot.rx, 2), Math.max(dot.ry, 2),  // never draw it at size 0
          0, 0, 2 * Math.PI
        );
        ctx.fillStyle = "rgba(224, 86, 122, 0.35)";  // semi-transparent fill
        ctx.fill();
        ctx.strokeStyle = "#e0567a";
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }

    // ---- Drawing the dot with a press + drag ----
    // 1) Press: set the dot's center.
    canvas.addEventListener("mousedown", function (event) {
      const p = getPos(event);
      if (!insideCircle(p.x, p.y)) {
        info.textContent = "Please press inside the circle.";
        return;
      }
      dragging = true;
      dot = { x: p.x, y: p.y, rx: 0, ry: 0 };
      draw();
    });

    // 2) Drag: grow the oval. Horizontal drag -> width, vertical -> height.
    canvas.addEventListener("mousemove", function (event) {
      if (!dragging) return;
      const p = getPos(event);
      dot.rx = Math.abs(p.x - dot.x);
      dot.ry = Math.abs(p.y - dot.y);
      info.textContent =
        "Dot size: " + Math.round(dot.rx) + " x " + Math.round(dot.ry);
      draw();
    });

    // 3) Release: finish the dot and send it to Python.
    canvas.addEventListener("mouseup", function () {
      if (!dragging) return;
      dragging = false;
      // If it was basically just a click, give it a small default size.
      if (dot.rx < 3 && dot.ry < 3) {
        dot.rx = 8;
        dot.ry = 8;
      }
      draw();
      sendDotToPython();
    });

    // ---- Send the dot to our Python backend ----
    function sendDotToPython() {
      fetch("/point", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ x: dot.x, y: dot.y, rx: dot.rx, ry: dot.ry })
      })
        .then(response => response.json())
        .then(reply => {
          document.getElementById("result").src = reply.image;
        });
    }

    // Draw the empty circle once when the page loads.
    draw();
  </script>
</body>
</html>
